plugins {
    id 'java'
    id 'application'
    // Add the official JavaFX plugin
    id 'org.openjfx.javafxplugin' version '0.1.0'
}

repositories {
    mavenCentral()
}

javafx {
    version = "25"

    // Declare which JavaFX modules your GUI needs
    // 'controls' handles buttons/labels, 'fxml' handles layout files if you use them
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
    // Point Gradle to your main class that contains the main method
    mainClass = 'org.example.Main'
    applicationDefaultJvmArgs = ['--enable-native-access=javafx.graphics']
    applicationDefaultJvmArgs = [
            '--enable-native-access=javafx.graphics',
            '-Dfile.encoding=UTF-8'
    ]
}

run {
    standardInput = System.in
}

dependencies {

    testImplementation 'org.junit.jupiter:junit-jupiter-api:5.10.0'

    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine:5.10.0'

}

test {
    useJUnitPlatform()

}